<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excellent Institute</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Loader -->
        <div id="loader">
            <i class="fa-solid fa-spinner fa-spin fa-3x" style="margin-bottom: 12px;"></i>
            <p id="loader-text">Loading...</p>
        </div>

        <!-- 3-Way Login Screen -->
        <div id="screen-login" class="screen active">
            <div class="card text-center" style="max-width: 400px; margin: auto; width: 100%;">
                <div class="logo-container">
                    <img src="logo.jpeg" alt="Logo" class="circular-logo" onerror="this.src='https://ui-avatars.com/api/?name=Excellent+Institute&background=4f46e5&color=fff&size=100'">
                </div>
                <h2>Excellent Institute</h2>
                <p class="subtitle">Secure Unified Portal</p>
                
                <form id="login-form">
                    <div class="input-group text-left">
                        <label>User ID</label>
                        <input type="text" id="userid" required placeholder="Phone Number or 'excellent'">
                    </div>
                    <div class="input-group text-left">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="Enter password...">
                    </div>
                    <p id="login-error">Incorrect credentials.</p>
                    <button type="submit" class="btn-primary" id="login-btn">Secure Login</button>
                </form>
            </div>
        </div>

        <!-- Admin / Staff Dashboard -->
        <div id="screen-dashboard" class="screen">
            <div class="top-app-bar">
                <span id="welcome-text">Dashboard</span>
                <i class="fa-solid fa-bell notification-icon" onclick="checkDues()"></i>
            </div>
            <div class="content-area">
                
                <div class="card" id="admin-broadcast-panel" style="display:none;">
                    <h3 style="margin-bottom:10px; font-size:14px;"><i class="fa-solid fa-bullhorn text-primary"></i> Broadcast Notice</h3>
                    <input type="text" id="bc-title" placeholder="Notice Title" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border);">
                    <textarea id="bc-msg" placeholder="Message for all students..." rows="2" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);"></textarea>
                    <button class="btn-primary" style="padding:10px; margin-top:10px;" onclick="sendBroadcast()">Send Notice</button>
                </div>

                <div class="stat-grid" id="financial-stats">
                    <div class="stat-box balance">
                        <p>Available Balance</p>
                        <h2 id="dash-balance">₹0</h2>
                    </div>
                </div>
                
                <div id="admin-controls">
                    <p class="section-heading">Quick Actions</p>
                    <div class="quick-actions">
                        <button class="action-btn" onclick="switchTab('admission')">
                            <i class="fa-solid fa-user-plus"></i> New Admission
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="bottom-nav">
                <button class="nav-item active" onclick="switchTab('dashboard')"><i class="fa-solid fa-chart-pie"></i>Home</button>
                <button class="nav-item" onclick="switchTab('students')"><i class="fa-solid fa-users"></i>Students</button>
                <button class="nav-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Logout</button>
            </div>
        </div>

        <!-- Student Personal Dashboard -->
        <div id="screen-student-dash" class="screen">
            <div class="top-app-bar">
                <span>My Profile</span>
            </div>
            <div class="content-area">
                <div class="profile-header card">
                    <div class="avatar-large" id="stu-avatar">S</div>
                    <h2 id="stu-name">Name</h2>
                    <p id="stu-course" style="color: var(--text-muted); font-weight: bold; font-size: 13px;">Course</p>
                    <p style="font-size: 11px; margin-top:5px; color: var(--primary);">Reg Date: <span id="stu-date"></span></p>
                </div>

                <div class="stat-grid" style="margin-top: 15px;">
                    <div class="stat-box" id="stu-due-card">
                        <p>Pending Dues</p>
                        <h2 id="stu-due-amount">₹0</h2>
                        <p style="font-size: 10px; color: var(--text-muted); margin-top: 5px;">Contact Admin to clear dues.</p>
                    </div>
                </div>
                
                <p class="section-heading" style="margin-top: 20px;">Institute Notices</p>
                <div class="card" id="stu-notices"></div>
            </div>
            <div class="bottom-nav">
                <button class="nav-item active"><i class="fa-solid fa-user"></i>Profile</button>
                <button class="nav-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Logout</button>
            </div>
        </div>
        
        <!-- Other Screens (Admission, Student List) remain structural -->
        <div id="screen-admission" class="screen">
            <div class="top-app-bar"><i class="fa-solid fa-arrow-left" onclick="switchTab('dashboard')" style="cursor: pointer;"></i><span>New Admission</span><i class="fa-solid fa-ellipsis-vertical" style="opacity:0;"></i></div>
            <div class="content-area">
                <div class="card">
                    <form id="admission-form">
                        <div class="input-group"><label>Date</label><input type="date" id="reg-date" required></div>
                        <div class="input-group"><label>Full Name</label><input type="text" id="reg-name" required></div>
                        <div class="input-group"><label>10-Digit Phone (Student ID)</label><input type="tel" id="reg-phone" pattern="[0-9]{10}" required></div>
                        <div class="input-group"><label>Course</label><input type="text" id="reg-course" required></div>
                        <div class="input-group"><label>Total Fee (₹)</label><input type="number" id="reg-fee" required></div>
                        <div class="input-group"><label>Advance (₹)</label><input type="number" id="reg-paid" required></div>
                        <button type="submit" class="btn-primary">Save Admission</button>
                    </form>
                </div>
            </div>
            <div class="bottom-nav"><button class="nav-item" onclick="switchTab('dashboard')"><i class="fa-solid fa-chart-pie"></i>Home</button><button class="nav-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Logout</button></div>
        </div>

        <div id="screen-students" class="screen">
            <div class="top-app-bar"><span>Student Database</span></div>
            <div class="content-area" style="padding: 0;"><div class="card" style="margin: 16px; padding: 0;" id="student-list"></div></div>
            <div class="bottom-nav"><button class="nav-item" onclick="switchTab('dashboard')"><i class="fa-solid fa-chart-pie"></i>Home</button><button class="nav-item active" onclick="switchTab('students')"><i class="fa-solid fa-users"></i>Students</button><button class="nav-item" onclick="logout()"><i class="fa-solid fa-power-off"></i>Logout</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
